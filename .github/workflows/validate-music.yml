name: Validate Pull Request

on:
  push:
    branches: [ main ]
  pull_request_target:
    branches: [ main ]

jobs:
  validate-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code (Push)
        if: github.event_name == 'push'
        uses: actions/checkout@v3

      - name: Checkout Main Branch (PR Base)
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Save Trusted Scripts
        if: github.event_name == 'pull_request_target'
        run: |
          mkdir -p /tmp/trusted-scripts
          cp -r scripts/* /tmp/trusted-scripts/
          cp music.json /tmp/baseline-music.json

      - name: Fetch PR Branch
        if: github.event_name == 'pull_request_target'
        run: |
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr-branch

      - name: Security Check (PR Files Filter)
        if: github.event_name == 'pull_request_target'
        run: |
          mapfile -d '' CHANGED_FILES < <(git diff -z --name-only main...pr-branch)
          git diff --name-only main...pr-branch > /tmp/changed-files.txt
          for file in "${CHANGED_FILES[@]}"; do
            if [[ -n "$file" && ! "$file" =~ ^music\.json$ && ! "$file" =~ ^Music/ ]]; then
              echo "Security Error: PR modifies protected system files ($file). Manual review is required."
              exit 1
            fi
          done

      - name: Checkout PR Branch
        if: github.event_name == 'pull_request_target'
        run: |
          git checkout -f pr-branch

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Auto-Fix JSON
        if: github.event_name == 'pull_request_target'
        run: |
          node /tmp/trusted-scripts/fix_music.js
        continue-on-error: true

      - name: Run Validation Script
        id: run-validation
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            node /tmp/trusted-scripts/validate_music.js
          else
            node scripts/validate_music.js
          fi
        continue-on-error: true

      - name: Post PR Comment
        if: github.event_name == 'pull_request_target'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: validation_report.md

      - name: Fail if validation failed
        if: steps.run-validation.outcome == 'failure'
        run: exit 1

      - name: Auto-merge PR
        if: github.event_name == 'pull_request_target' && steps.run-validation.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --squash --auto || gh pr merge ${{ github.event.pull_request.number }} --squash
